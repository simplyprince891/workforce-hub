server:
  port: 8080

spring:
  application:
    name: workforce-hub
  
  datasource:
    url: jdbc:postgresql://localhost:5432/workforce
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: workforce-hub-secret-key-for-jwt-token-generation-2024-workforce-management
  expiration: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.workforce: DEBUG
    org.springframework.security: DEBUG